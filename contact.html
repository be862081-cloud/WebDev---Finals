<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { background-color: #111; color: #fff; }
  .gold { color: gold; }
  .btn-gold {
    background-color: gold;
    color: black;
    border: none;
  }
  .btn-gold:hover {
    background-color: #d4af37;
  }
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg" style="background:black;">
  <div class="container">
    <a class="navbar-brand gold" href="#">CABGOLD</a>
    <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#nav">
      ☰
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link gold" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link gold" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link gold" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h1 class="gold">Contact Us</h1>

  <form>
    <div class="mb-3">
      <label>Name</label>
      <input type="text" class="form-control" placeholder="Enter name">
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" class="form-control" placeholder="Enter email">
    </div>

    <div class="mb-3">
      <label>Message</label>
      <textarea class="form-control" rows="4"></textarea>
    </div>

    <button class="btn btn-gold">Send</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
